name: Auto Data Pipeline (Month-End)

on:
  schedule:
    - cron: '0 12 28-31 * *'   # Runs on 28–31 every month
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pandas yfinance openpyxl matplotlib

    - name: Run data pipeline
      run: |
        python script/download_data.py

    - name: Commit updated data
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add output/
        git commit -m "Auto update data (month-end)" || echo "No changes"
        git push

    - name: Send Email Notification
      run: |
        python - <<EOF
        import smtplib
        from email.mime.text import MIMEText
        import os

        sender = os.environ['EMAIL_USER']
        password = os.environ['EMAIL_PASS']
        receiver = sender

        msg = MIMEText("✅ Your AI pipeline ran successfully at month-end.\n\n📊 Data updated.\n🚀 Dashboard refreshed.")
        msg['Subject'] = "🚀 AI Pipeline Success"
        msg['From'] = sender
        msg['To'] = receiver

        server = smtplib.SMTP_SSL('smtp.gmail.com', 465)
        server.login(sender, password)
        server.send_message(msg)
        server.quit()

        print("📧 Email sent successfully!")
        EOF
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
