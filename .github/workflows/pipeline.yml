name: Auto Data Pipeline (Month-End)

on:
  schedule:
    - cron: '0 12 28-31 * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install pandas yfinance openpyxl matplotlib twilio

    - name: Run data pipeline
      run: |
        python script/download_data.py

    - name: Commit updated data
      run: |
        git config user.name "github-actions"
        git config user.email "actions@github.com"
        git add output/
        git commit -m "Auto update data (month-end)" || echo "No changes"
        git push origin main

    # ===============================
    # 📧 EMAIL ALERT
    # ===============================
    - name: Send Email Notification
      env:
        EMAIL_USER: ${{ secrets.EMAIL_USER }}
        EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
      run: |
        python - <<EOF
        import smtplib
        from email.mime.text import MIMEText
        import os

        sender = os.environ['EMAIL_USER']
        password = os.environ['EMAIL_PASS']

        msg = MIMEText("✅ Pipeline ran successfully.\n📊 Data updated\n🚀 Dashboard ready")
        msg['Subject'] = "🚀 AI Pipeline Success"
        msg['From'] = sender
        msg['To'] = sender

        server = smtplib.SMTP_SSL('smtp.gmail.com', 465)
        server.login(sender, password)
        server.send_message(msg)
        server.quit()

        print("📧 Email sent successfully!")
        EOF

    # ===============================
    # 📲 WHATSAPP ALERT (TWILIO)
    # ===============================
    - name: Send WhatsApp Notification
      env:
        TWILIO_SID: ${{ secrets.TWILIO_SID }}
        TWILIO_AUTH: ${{ secrets.TWILIO_AUTH }}
        TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
        TWILIO_TO: ${{ secrets.TWILIO_TO }}
      run: |
        python - <<EOF
        from twilio.rest import Client
        import os

        sid = os.environ['TWILIO_SID']
        token = os.environ['TWILIO_AUTH']

        client = Client(sid, token)

        message = client.messages.create(
            body="🚀 Pipeline Success!\n📊 Data updated\n🌐 Dashboard ready",
            from_=os.environ['TWILIO_FROM'],
            to=os.environ['TWILIO_TO']
        )

        print("📲 WhatsApp message sent:", message.sid)
        EOF
